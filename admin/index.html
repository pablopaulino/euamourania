<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Painel administrativo | Eu Amo Urânia</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="publicidade.css" />
    <link rel="stylesheet" href="cms-enhancements.css" />
    <link rel="stylesheet" href="cms-v2.css" />
    <link rel="stylesheet" href="cms-redesign.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"
      defer
    ></script>
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar" id="sidebar">
        <img
          src="../assets/1505 - Urania - Logo Horizontal - 1.png"
          alt="Eu Amo Urânia"
          class="admin-logo"
        />
        <nav class="admin-nav" aria-label="Seções do painel">
          <button data-view="dashboard" class="active">Visão geral</button
          ><button data-view="noticias">Notícias</button
          ><button data-view="guia_comercial">Guia comercial</button
          ><button data-view="turismo">Turismo</button
          ><button data-view="links">Links</button
          ><button data-view="eventos">Eventos</button
          ><button type="button" onclick="location.href='publicidade.html'">
            Publicidade</button
          ><button type="button" onclick="location.href='comunicacao.html'">
            Comunicação</button
          ><button
            type="button"
            onclick="location.href='notificacoes-app.html'"
          >
            Notificações do app</button
          ><button type="button" onclick="location.href='melhores.html'">
            Melhores de UrÃ¢nia</button
          ><button data-view="categorias">Categorias</button
          ><button data-view="insights">Estatísticas</button
          ><button data-view="configuracoes_site">Configurações</button
          ><button type="button" onclick="location.href='usuarios.html'">
            Usuários</button
          ><button type="button" onclick="location.href='migrar.html'">
            Importar JSON
          </button>
        </nav>
        <div class="admin-sidebar-footer">
          <p id="admin-user"></p>
          <button id="logout" class="admin-button secondary">Sair</button>
        </div>
      </aside>
      <main class="admin-main">
        <header class="admin-topbar">
          <div>
            <button id="mobile-menu" class="admin-button secondary mobile-menu">
              Menu
            </button>
            <h1 id="page-title">Visão geral</h1>
            <p id="page-hint" class="admin-page-hint">
              Acompanhe os principais dados do portal e escolha um módulo no
              menu para gerenciar conteúdo, publicidade, comunicação e
              configurações.
            </p>
          </div>
          <a
            class="admin-button secondary"
            href="../index.html"
            target="_blank"
            rel="noopener"
            >Ver site ↗</a
          >
        </header>
        <div id="app-content" class="loading">Verificando acesso…</div>
      </main>
    </div>
    <div class="toast-stack" id="toasts" aria-live="polite"></div>
    <script type="module" src="admin.js"></script>
    <script type="module" src="cms-generic.js"></script>
    <script type="module" src="news-publication-fields.js"></script>
    <script type="module" src="cms-v2.js"></script>
    <script type="module" src="site-settings.js"></script>
  </body>
</html>

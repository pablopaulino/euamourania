<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Notificações do app | Eu Amo Urânia CMS</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="publicidade.css">
  <link rel="stylesheet" href="cms-v2.css">
  <link rel="stylesheet" href="notificacoes-app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar" id="sidebar">
      <img src="../assets/1505 - Urania - Logo Horizontal - 1.png" alt="Eu Amo Urânia" class="admin-logo">
      <nav class="admin-nav">
        <button onclick="location.href='index.html'">Visão geral</button>
        <button class="active">Notificações do app</button>
      </nav>
      <div class="admin-sidebar-footer">
        <p id="admin-user"></p>
        <button id="logout" class="admin-button secondary">Sair</button>
      </div>
    </aside>
    <main class="admin-main ads-main">
      <header class="admin-topbar">
        <div>
          <button id="mobile-menu" class="admin-button secondary mobile-menu">Menu</button>
          <h1>Notificações do Viva Urânia</h1>
        </div>
        <a class="admin-button secondary" href="index.html">← Painel</a>
      </header>
      <div class="ads-content">
        <div class="push-heading">
          <div>
            <h2>Central de notificações</h2>
            <p>Envie novidades para quem autorizou notificações no aplicativo.</p>
          </div>
          <button class="admin-button" id="new-notification">+ Nova notificação</button>
        </div>
        <div id="push-app"><div class="skeleton"></div><div class="skeleton"></div></div>
      </div>
    </main>
  </div>
  <div class="toast-stack" id="toasts" aria-live="polite"></div>
  <script type="module" src="notificacoes-app.js"></script>
</body>
</html>

<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar no painel | Eu Amo Urânia</title><link rel="stylesheet" href="admin.css"><link rel="stylesheet" href="cms-redesign.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"></head><body class="login-page"><main class="login-card"><img src="../assets/1505 - Urania - Logo Horizontal - 1.png" alt="Eu Amo Urânia"><p class="eyebrow">Área restrita</p><h1>Painel administrativo</h1><p>Entre com o usuário criado no Supabase Auth.</p><form id="login-form"><label>E-mail<input type="email" id="email" autocomplete="email" required></label><label>Senha<input type="password" id="password" autocomplete="current-password" required></label><button class="admin-button full" type="submit">Entrar</button><p id="message" class="form-message" role="alert"></p></form><a href="../index.html">← Voltar ao site</a></main><script type="module">import{entrar}from'./auth.js';const form=document.getElementById('login-form'),message=document.getElementById('message');form.addEventListener('submit',async e=>{e.preventDefault();message.textContent='Entrando…';const button=form.querySelector('button');button.disabled=true;try{await entrar(document.getElementById('email').value,document.getElementById('password').value);location.replace('index.html')}catch(error){message.textContent=error.message}finally{button.disabled=false}});if(new URLSearchParams(location.search).get('erro'))message.textContent='Sua conta não tem permissão de administrador.';</script></body></html>

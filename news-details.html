<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#0b4f6c"><title>Notícia | Eu Amo Urânia</title>
  <link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="inner-pages.css"><link rel="icon" href="assets/Design sem nome (9).png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="inner-page">
  <a class="skip-link" href="#newsDetails">Pular para a notícia</a>
  <header class="site-header"><div class="container header-content"><a class="brand" href="index.html" aria-label="Eu Amo Urânia — início"><img src="assets/1505 - Urania - Logo Horizontal - 1.png" alt="Eu Amo Urânia" width="190" height="56"></a><button class="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-principal"><span class="menu-icon" aria-hidden="true"></span><span>Menu</span></button><nav class="main-nav" id="menu-principal" aria-label="Navegação principal"><ul><li><a href="index.html">Início</a></li><li><a href="guia.html">Guia da cidade</a></li><li><a href="news/index.html" aria-current="page">Notícias</a></li><li><a href="quem-somos.html">Quem somos</a></li></ul></nav></div></header>
  <main id="newsDetails" class="article-main" aria-live="polite"></main>
  <a href="https://wa.me/5517981344558" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Falar pelo WhatsApp (abre em nova aba)"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="" width="28" height="28"></a>
  <footer class="site-footer"><div class="container footer-grid"><div><img src="assets/1505 - Urania - Logo Horizontal - 1.png" alt="Eu Amo Urânia" class="footer-logo" width="170" height="50"><p>Informação, turismo e comunidade.</p></div><nav aria-label="Links do rodapé"><a href="mailto:euamourania@gmail.com">Contato</a><a href="termos-de-servico.html">Termos de serviço</a><a href="politica-de-privacidade.html">Privacidade</a></nav></div><div class="container footer-bottom"><p>&copy; <span id="year"></span> Eu Amo Urânia. Todos os direitos reservados.</p></div></footer>
  <div id="cookie-banner" class="cookie-banner" role="region" aria-label="Aviso sobre cookies" hidden><p>Usamos cookies para melhorar sua experiência. Consulte nossa <a href="politica-de-privacidade.html">Política de Privacidade</a>.</p><button id="accept-cookies" type="button">Entendi</button></div>
  <script>
    async function fetchAndDisplayNewsDetails() {
      const parameterSource = window.location.hash.startsWith('#id=') ? window.location.hash.slice(1) : window.location.search;
      const newsId = new URLSearchParams(parameterSource).get('id');
      const container = document.getElementById('newsDetails');
      try {
        const response = await fetch('news-data.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const rawData = await response.text();
        const newsArray = JSON.parse(rawData.replace(/,\s*]/g, ']'));
        const news = newsArray.find(item => item.id === Number(newsId));
        if (!news) { document.title = 'Notícia não encontrada'; container.innerHTML = '<p class="not-found-message">Notícia não encontrada.</p>'; return; }
        document.title = `${news.title} | Eu Amo Urânia`;
        [['og:title', news.title], ['og:description', news.content.replace(/<[^>]*>/g, '').substring(0, 150)], ['og:image', news.image], ['og:url', window.location.href]].forEach(([property, content]) => { const meta = document.createElement('meta'); meta.setAttribute('property', property); meta.content = content; document.head.appendChild(meta); });
        const fullContent = news.content.replace(/\n/g, '<br>');
        container.innerHTML = `<article class="news-detail-container"><img src="${news.image}" alt="${news.title}" class="main-image"><div class="content"><p class="eyebrow">Notícias de Urânia</p><h1>${news.title}</h1><p class="meta">${news.author} · ${news.date}</p><div class="article-copy">${fullContent}</div><div class="share-buttons"><p>Compartilhe esta notícia</p><a href="https://api.whatsapp.com/send?text=${encodeURIComponent(news.title + ' - ' + window.location.href)}" target="_blank" rel="noopener noreferrer" class="btn-share">WhatsApp</a><a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener noreferrer" class="btn-share">Facebook</a></div></div></article>`;
      } catch (error) { console.error('Erro ao buscar notícia:', error); container.innerHTML = '<p class="not-found-message">Não foi possível carregar a notícia. Tente novamente mais tarde.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', fetchAndDisplayNewsDetails);
  </script><script src="script.js"></script>
</body>
</html>
